        <p><strong>問：我的吐槽內容會上傳到雲端嗎？</strong><br>答：不會。所有吐槽記錄僅保存在你的手機本地。</p>
        <p><strong>問：為什麼找不到歷史記錄？</strong><br>答：歷史是隱藏入口。在「關於」頁長按版本資訊即可進入。</p>
        <p><strong>問：可以編輯已保存的吐槽嗎？</strong><br>答：可以。打開「吐槽詳情」後點右上角「編輯」。</p>
        <p><strong>問：如何保護吐槽歷史？</strong><br>答：在「設定 > 隱私安全」中啟用查看歷史前需要解鎖。</p>
